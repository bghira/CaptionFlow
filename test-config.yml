orchestrator:
  host: 0.0.0.0
  port: 8765
  #  # Use the paths output by 'caption-flow generate-cert' command
  #  cert: /etc/letsencrypt/live/caption.example.com/fullchain.pem  # From generate-cert output
  #  key: /etc/letsencrypt/live/caption.example.com/privkey.pem      # From generate-cert output
  # Dataset configuration - centrally managed by orchestrator
  chunk_size: 1000 # Items per chunk
  chunks_per_request: 2 # Chunks sent to worker at once
  chunk_buffer_multiplier: 3 # Target chunks = workers * multiplier
  min_chunk_buffer: 10 # Minimum chunks to keep ready
  dataset:
    type: "local_filesystem"
    processor_type: "local_filesystem" # Ensure this is correctly placed and indented
    dataset_path: "/Volumes/ml/datasets/geo" # HF dataset path or local directory
    name: "Heloise"
    http_bind_address: "0.0.0.0"
    public_address: "localhost" # your public IP
  # vLLM configuration - distributed to all workers
  vllm:
    # Model settings
    model: "XiaomiMiMo/MiMo-VL-7B-SFT-2508"
    tensor_parallel_size: 1
    max_model_len: 16384
    dtype: "bfloat16" # or "float32", "bfloat16"
    gpu_memory_utilization: 0.92
    enforce_eager: true
    disable_mm_preprocessor_cache: true
    limit_mm_per_prompt:
      image: 1
    # Batching
    batch_size: 1
    # Sampling parameters
    sampling:
      temperature: 0.3
      top_p: 0.95
      max_tokens: 16384
      repetition_penalty: 1.05
      skip_special_tokens: true
      stop:
        - "<|end|>"
        - ""
        - "<|im_end|>"
    # Stages configuration - Fixed indentation
    stages:
      - name: "detailed_analysis"
        model: "XiaomiMiMo/MiMo-VL-7B-SFT-2508"
        prompts:
          - "Analyze this image comprehensively. Describe the person shown as Heloise, noting her physical appearance, facial expression, body language, clothing, and styling. Detail the environment, objects, lighting, composition, and visual elements. Focus on factual observations without interpretation."
        output_field: "detailed_caption"
      - name: "error_verification"
        model: "XiaomiMiMo/MiMo-VL-7B-SFT-2508"
        prompts:
          - "Review this image description for accuracy: {detailed_caption}. Cross-reference against the actual image to identify any factual errors, omissions, or inconsistencies. Provide a corrected and enhanced description that maintains all references to Heloise while ensuring complete accuracy."
        output_field: "verified_caption"
        requires: ["detailed_analysis"]
      - name: "narrative_synthesis"
        prompts:
          - "Transform this verified description into an eloquent, cohesive paragraph: {verified_caption}. Create a flowing narrative that seamlessly integrates all visual elements while maintaining Heloise as the central subject. The result should read as sophisticated prose that captures every detail in the image."
        output_field: "final_narrative"
        requires: ["error_verification"]
storage:
  data_dir: ./caption_data-test
  checkpoint_interval: 1000
  caption_buffer_size: 100
  job_buffer_size: 100
  contributor_buffer_size: 10
  checkpoint_dir: ./checkpoints-test
auth:
  worker_tokens:
    - token: "worker-alpha-2024"
      name: "NVIDIA 4090 1"
    - token: "worker-beta-2024"
      name: "NVIDIA 4090 2"
    - token: "worker-kappa-2024"
      name: "NVIDIA 4090 3"
    - token: "example-worker-token"
      name: "Example Worker Token"
  monitor_tokens:
    - token: "letmein"
      name: "Default demo Monitor user"
  admin_tokens:
    - token: "admin-secret-2024"
      name: "Default admin user, misconfigured system"
